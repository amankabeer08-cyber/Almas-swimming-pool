<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Almas Swimming Pool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--off-white);
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
        }
        
        .admin-navbar {
            background-color: var(--dark-blue);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-navbar h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .btn-logout {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout:hover {
            background-color: #cc0000;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 5px;
            transition: var(--transition-fast);
        }

        .tab-btn.active {
            background-color: var(--primary-blue);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background-color: var(--light-blue);
            color: var(--primary-blue);
        }

        .tab-content {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--light-blue);
            color: var(--dark-blue);
            font-weight: 600;
        }

        tr:hover {
            background-color: #f1f7fd;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <nav class="admin-navbar">
        <h2><i class="fa-solid fa-shield-halved"></i> Admin Dashboard</h2>
        <button class="btn-logout" id="adminLogoutBtn"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
    </nav>

    <div class="dashboard-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('bookings')"><i class="fa-solid fa-calendar-check"></i> Bookings</button>
            <button class="tab-btn" onclick="switchTab('contacts')"><i class="fa-solid fa-envelope"></i> Messages</button>
            <button class="tab-btn" onclick="switchTab('users')"><i class="fa-solid fa-users"></i> Users</button>
        </div>

        <!-- Bookings Tab -->
        <div id="bookings" class="tab-content active">
            <h3>Recent Bookings</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Name</th>
                            <th>Email & Phone</th>
                            <th>Duration / Persons</th>
                            <th>Special Requests</th>
                            <th>Submitted At</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <tr><td colspan="6" class="empty-state">Loading bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Contacts Tab -->
        <div id="contacts" class="tab-content">
            <h3>Contact Messages</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Submitted At</th>
                        </tr>
                    </thead>
                    <tbody id="contactsTableBody">
                        <tr><td colspan="4" class="empty-state">Loading messages...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="users" class="tab-content">
            <h3>Registered Users</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="3" class="empty-state">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Security check
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userStr);
            if (!user.isAdmin) {
                alert('Access Denied. Admins only.');
                window.location.href = 'index.html';
            }
        }

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Logout
        document.getElementById('adminLogoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // Data Fetching Logic
        async function fetchAdminData() {
            try {
                // Fetch Bookings
                const bookingsRes = await fetch('/api/admin/bookings');
                const bookings = await bookingsRes.json();
                const bBody = document.getElementById('bookingsTableBody');
                if (bookings.length === 0) {
                    bBody.innerHTML = '<tr><td colspan="6" class="empty-state">No bookings found.</td></tr>';
                } else {
                    bBody.innerHTML = bookings.map(b => `
                        <tr>
                            <td><strong>${b.date}</strong><br>${b.time || 'N/A'}</td>
                            <td>${b.name}</td>
                            <td>${b.email}<br>${b.phone}</td>
                            <td>${b.persons} Person(s)</td>
                            <td>${b.requests || '-'}</td>
                            <td>${new Date(b.created_at).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }

                // Fetch Contacts
                const contactsRes = await fetch('/api/admin/contacts');
                const contacts = await contactsRes.json();
                const cBody = document.getElementById('contactsTableBody');
                if (contacts.length === 0) {
                    cBody.innerHTML = '<tr><td colspan="4" class="empty-state">No messages found.</td></tr>';
                } else {
                    cBody.innerHTML = contacts.map(c => `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.email}</td>
                            <td>${c.message}</td>
                            <td>${new Date(c.created_at).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }

                // Fetch Users
                const usersRes = await fetch('/api/admin/users');
                const users = await usersRes.json();
                const uBody = document.getElementById('usersTableBody');
                if (users.length === 0) {
                    uBody.innerHTML = '<tr><td colspan="3" class="empty-state">No users found.</td></tr>';
                } else {
                    uBody.innerHTML = users.map(u => `
                        <tr>
                            <td>#${u.id}</td>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                        </tr>
                    `).join('');
                }

            } catch (error) {
                console.error('Error fetching admin data:', error);
                alert('Error connecting to the server to fetch data.');
            }
        }

        // Initialize
        fetchAdminData();
    </script>
</body>
</html>
